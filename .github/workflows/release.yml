name: release

# Publishes @developerz.ai/ui-debugger-mcp to npm using OIDC trusted publishing —
# no NPM_TOKEN secret. npm mints a short-lived token from the GitHub Actions
# id-token and verifies it against the trusted publisher configured on npmjs.com.
# Provenance attestation is automatic.
#
# One-time prerequisites (on npmjs.com):
#   1. Bootstrap the first version manually (package must exist before a trusted
#      publisher can be attached) — see PUBLISHING notes.
#   2. Package -> Settings -> Trusted Publisher -> GitHub Actions:
#        Organization/user: developerz-ai
#        Repository:        ui-debugger-mcp
#        Workflow filename: release.yml

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # REQUIRED for OIDC — lets npm mint a token from this run

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Trusted publishing needs npm >= 11.5.1; Node 22 ships an older npm.
      - name: upgrade npm
        run: npm install -g npm@latest

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: install
        run: bun install --frozen-lockfile

      - name: build
        run: bun run build

      - name: publish
        run: npm publish
