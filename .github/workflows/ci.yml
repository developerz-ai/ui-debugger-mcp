name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bun:
    name: bun (lint + typecheck + test)
    # Blacksmith 2 vCPU runner — fast on small matrices, plenty for this suite.
    runs-on: blacksmith-2vcpu-ubuntu-2204
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: install
        run: bun install

      - name: lint
        run: bun run lint

      - name: typecheck
        run: bun run typecheck

      # The dummy/web e2e fixture is a standalone package (its own bun.lock), so the
      # repo-root install never reaches it. Build it up front — the e2e suite then
      # finds dist/ and skips the heavy install+build inside a test hook.
      - name: build dummy/web fixture
        run: bun install --frozen-lockfile && bun run build
        working-directory: dummy/web

      # Browser integration tests drive a real Chromium. Cache the Playwright-
      # managed browser (keyed on bun.lock so a playwright-core bump invalidates it)
      # so it isn't re-downloaded each run; the adapter prefers managed Chromium.
      - name: cache Playwright Chromium
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-playwright-

      - name: install chromium
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            bunx playwright install-deps chromium
          else
            bunx playwright install --with-deps chromium
          fi

      # bun test runs test files in parallel by default.
      - name: test
        run: bun test

      - name: build
        run: bun run build
