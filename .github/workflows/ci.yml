name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bun:
    name: bun (lint + typecheck + test)
    # Blacksmith 2 vCPU runner — fast on small matrices, plenty for this suite.
    runs-on: blacksmith-2vcpu-ubuntu-2204
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: install
        run: bun install

      - name: lint
        run: bun run lint

      - name: typecheck
        run: bun run typecheck

      # bun test runs test files in parallel by default.
      - name: test
        run: bun test

      - name: build
        run: bun run build
