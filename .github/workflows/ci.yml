name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bun:
    name: bun (lint + typecheck + test)
    # Blacksmith 2 vCPU runner — fast on small matrices, plenty for this suite.
    runs-on: blacksmith-2vcpu-ubuntu-2204
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: install
        run: bun install

      - name: lint
        run: bun run lint

      - name: typecheck
        run: bun run typecheck

      # The dummy/web e2e fixture is a standalone package (its own bun.lock), so the
      # repo-root install never reaches it. Build it up front — the e2e suite then
      # finds dist/ and skips the heavy install+build inside a test hook.
      - name: build dummy/web fixture
        run: bun install --frozen-lockfile && bun run build
        working-directory: dummy/web

      # Browser integration tests drive a real Chromium. Install the Playwright-
      # managed build so the adapter uses a consistent binary — it prefers managed
      # Chromium over a runner's system Chrome, which on some images is sandbox-
      # confined and can't reach the localhost test fixture (ERR_CONNECTION_REFUSED).
      - name: install chromium
        run: bunx playwright install --with-deps chromium

      # bun test runs test files in parallel by default.
      - name: test
        run: bun test

      - name: build
        run: bun run build
